<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Atomic Age Beauty Guide — Energy Quiz</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lora:ital,wght@0,400;0,600;1,400;1,600&family=Special+Elite&display=swap');

  :root {
    --pink: #f2b8c6;
    --pink-bg: #f5c6d0;
    --mint: #b5e4d3;
    --mint-dark: #7ec8b0;
    --cream: #f5efe0;
    --cream-dark: #e8dcc8;
    --brown: #3b2314;
    --brown-light: #5c3a24;
    --teal: #2a9d8f;
    --teal-dark: #1f7a6f;
    --correct: #4caf50;
    --wrong: #d64545;
    --card-shadow: 2px 3px 12px rgba(59,35,20,0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Lora', Georgia, serif;
    background: var(--pink-bg);
    color: var(--brown);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ---- Checkered header bar ---- */
  .checker-bar {
    width: 100%;
    height: 32px;
    background: repeating-conic-gradient(var(--pink) 0% 25%, var(--mint) 0% 50%) 0 0 / 32px 32px;
  }

  /* ---- Hero / Title Card ---- */
  .hero {
    text-align: center;
    padding: 36px 20px 24px;
    max-width: 720px;
  }
  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 2.4rem;
    color: var(--brown);
    line-height: 1.15;
    margin-bottom: 6px;
  }
  .hero h1 .script {
    font-style: italic;
    font-weight: 700;
  }
  .hero .subtitle {
    font-family: 'Special Elite', monospace;
    font-size: 1rem;
    color: var(--teal-dark);
    letter-spacing: 0.5px;
  }

  /* ---- Progress bar ---- */
  .progress-wrap {
    width: 90%;
    max-width: 640px;
    margin: 12px auto 4px;
  }
  .progress-label {
    font-family: 'Special Elite', monospace;
    font-size: 0.85rem;
    margin-bottom: 4px;
    color: var(--brown-light);
  }
  .progress-track {
    height: 18px;
    background: var(--cream);
    border: 2px solid var(--brown);
    border-radius: 9px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--teal), var(--mint-dark));
    border-radius: 7px;
    transition: width 0.5s ease;
  }

  /* ---- Quiz container ---- */
  .quiz-area {
    width: 92%;
    max-width: 680px;
    margin: 18px auto 32px;
  }

  /* ---- Vintage card ---- */
  .card {
    background: var(--cream);
    border: 2px solid var(--brown);
    border-radius: 10px;
    box-shadow: var(--card-shadow);
    padding: 28px 26px 22px;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    inset: 6px;
    border: 1.5px solid var(--mint-dark);
    border-radius: 6px;
    pointer-events: none;
  }

  .card .topic-tag {
    display: inline-block;
    font-family: 'Special Elite', monospace;
    font-size: 0.75rem;
    background: var(--mint);
    color: var(--teal-dark);
    padding: 2px 10px;
    border-radius: 4px;
    margin-bottom: 10px;
    letter-spacing: 0.5px;
  }

  .card .q-number {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 1.05rem;
    color: var(--teal-dark);
    margin-bottom: 8px;
  }

  .card .question-text {
    font-size: 1.15rem;
    font-weight: 600;
    line-height: 1.45;
    margin-bottom: 20px;
  }

  /* ---- Answer buttons ---- */
  .answers {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  @media (max-width: 500px) {
    .answers { grid-template-columns: 1fr; }
  }

  .ans-btn {
    font-family: 'Lora', Georgia, serif;
    font-size: 1rem;
    font-weight: 600;
    padding: 14px 16px;
    border: 2px solid var(--brown);
    border-radius: 8px;
    background: #fff;
    color: var(--brown);
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
    line-height: 1.3;
  }
  .ans-btn:hover:not(.locked) {
    background: var(--mint);
    border-color: var(--teal);
  }
  .ans-btn.correct {
    background: #c8f7c5;
    border-color: var(--correct);
    color: #1b5e20;
  }
  .ans-btn.wrong {
    background: #fcc;
    border-color: var(--wrong);
    color: #7f1d1d;
  }
  .ans-btn.locked { cursor: default; opacity: 0.7; }
  .ans-btn.locked.correct { opacity: 1; }

  /* ---- Feedback strip ---- */
  .feedback {
    margin-top: 16px;
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 0.95rem;
    line-height: 1.4;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.right {
    background: #dcedc8;
    border-left: 4px solid var(--correct);
  }
  .feedback.wrong-fb {
    background: #fde0e0;
    border-left: 4px solid var(--wrong);
  }

  /* ---- Next button ---- */
  .next-btn {
    display: none;
    margin: 18px auto 0;
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 1.05rem;
    padding: 12px 36px;
    border: 2px solid var(--brown);
    border-radius: 8px;
    background: var(--pink);
    color: var(--brown);
    cursor: pointer;
    transition: background 0.2s;
  }
  .next-btn:hover { background: var(--mint); }
  .next-btn.show { display: block; }

  /* ---- Results card ---- */
  .results-card {
    text-align: center;
    padding: 36px 28px;
  }
  .results-card h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    margin-bottom: 8px;
  }
  .results-card .score-big {
    font-family: 'Special Elite', monospace;
    font-size: 3.2rem;
    color: var(--teal-dark);
    margin: 12px 0;
  }
  .results-card .verdict {
    font-size: 1.1rem;
    margin-bottom: 20px;
  }
  .results-card .retry-btn {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 1.05rem;
    padding: 12px 40px;
    border: 2px solid var(--brown);
    border-radius: 8px;
    background: var(--mint);
    color: var(--brown);
    cursor: pointer;
  }
  .results-card .retry-btn:hover { background: var(--pink); }

  /* ---- Footer ---- */
  footer {
    font-family: 'Special Elite', monospace;
    font-size: 0.75rem;
    color: var(--brown-light);
    text-align: center;
    padding: 8px 12px 18px;
    opacity: 0.7;
  }
</style>
</head>
<body>

<div class="checker-bar"></div>

<div class="hero">
  <h1><span class="script">The Atomic Age Beauty Guide</span></h1>
  <div class="subtitle">Module 1 Quiz — Energy Stores, Transfers &amp; Calculations</div>
</div>

<div class="progress-wrap">
  <div class="progress-label" id="progLabel">Question 1 of 15</div>
  <div class="progress-track"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
</div>

<div class="quiz-area" id="quizArea"></div>

<div class="checker-bar" style="margin-top:auto"></div>
<footer>The Physics of the Salon — A Training Manual</footer>

<script>
const questions = [
  // --- Energy Stores (identification) ---
  {
    topic: "Energy Stores",
    q: "A nail tech eats a sandwich before a busy day. What type of energy store is in the sandwich?",
    options: ["Thermal energy", "Chemical energy", "Kinetic energy", "Elastic potential energy"],
    correct: 1,
    explain: "Food stores chemical energy. The body converts it into movement and heat."
  },
  {
    topic: "Energy Stores",
    q: "Warm wax is used for a hand treatment. Which energy store does the warm wax hold?",
    options: ["Chemical energy", "Gravitational potential energy", "Thermal energy", "Elastic potential energy"],
    correct: 2,
    explain: "Warm or hot objects hold thermal energy."
  },
  {
    topic: "Energy Stores",
    q: "A spinning nail drill bit has which type of energy?",
    options: ["Gravitational potential energy", "Chemical energy", "Elastic potential energy", "Kinetic energy"],
    correct: 3,
    explain: "Anything that is moving has kinetic energy."
  },
  {
    topic: "Energy Stores",
    q: "A bottle of nail polish sits on the top shelf. What energy does it store because of its height?",
    options: ["Kinetic energy", "Thermal energy", "Gravitational potential energy", "Chemical energy"],
    correct: 2,
    explain: "An object high above the ground stores gravitational potential energy (GPE)."
  },
  {
    topic: "Energy Stores",
    q: "A salon chair cushion is squeezed down by someone sitting on it. What energy store is this?",
    options: ["Elastic potential energy", "Kinetic energy", "Thermal energy", "Chemical energy"],
    correct: 0,
    explain: "A squashed or stretched object stores elastic potential energy."
  },

  // --- Energy Transfers ---
  {
    topic: "Energy Transfers",
    q: "A cordless drill runs on a battery. The battery's chemical energy transfers into useful kinetic energy (spinning) and two waste forms. What are they?",
    options: ["Light and sound", "Thermal energy and sound", "Gravitational energy and light", "Elastic energy and thermal energy"],
    correct: 1,
    explain: "The drill produces wasted heat (thermal) and motor noise (sound) as byproducts."
  },
  {
    topic: "Energy Transfers",
    q: "A bottle of polish falls from a shelf and smashes on the floor. At the moment it hits, its gravitational potential energy and kinetic energy are both zero. Where did the energy go?",
    options: ["It disappeared", "Into sound and heat", "Back into chemical energy", "Into elastic potential energy"],
    correct: 1,
    explain: "Energy never disappears. On impact it transfers into sound and heat."
  },
  {
    topic: "The Golden Rule",
    q: "What is the 'Golden Rule of Energy'?",
    options: ["Energy always increases over time", "Energy can be created but not destroyed", "Energy does not disappear — it changes form or moves somewhere else", "Energy only exists in chemical stores"],
    correct: 2,
    explain: "Energy is always conserved. It changes form or transfers to another object — it never vanishes."
  },

  // --- Useful vs. Wasted ---
  {
    topic: "Useful vs. Wasted",
    q: "A UV nail lamp uses electrical energy to produce light that cures gel polish. The lamp also gets warm. Which output is the WASTED energy?",
    options: ["The UV light", "The cured gel", "The extra heat", "The electrical energy"],
    correct: 2,
    explain: "The light is useful (it does the job). The extra heat is a wasted byproduct."
  },
  {
    topic: "Useful vs. Wasted",
    q: "A hair dryer at the salon blows warm air to dry skin. It also makes a loud motor noise. The useful energy output is:",
    options: ["Sound from the motor", "Moving warm air", "Vibration of the casing", "Chemical energy in the plug"],
    correct: 1,
    explain: "The moving warm air does the intended job (drying). The sound is wasted energy."
  },

  // --- Efficiency ---
  {
    topic: "Efficiency",
    q: "A nail lamp uses 100 J of energy and produces 60 J of useful light. What is its efficiency?",
    options: ["40%", "60%", "160%", "6%"],
    correct: 1,
    explain: "Efficiency = (Useful ÷ Total) × 100 = (60 ÷ 100) × 100 = 60%."
  },
  {
    topic: "Efficiency",
    q: "An electric nail drill uses 50 J of energy. Only 20 J becomes useful spinning movement. What is its efficiency?",
    options: ["50%", "20%", "40%", "70%"],
    correct: 2,
    explain: "Efficiency = (20 ÷ 50) × 100 = 40%."
  },

  // --- Joules & Kilojoules ---
  {
    topic: "Joules & Kilojoules",
    q: "How many joules (J) are in 5 kilojoules (kJ)?",
    options: ["50 J", "500 J", "5000 J", "5 J"],
    correct: 2,
    explain: "1 kJ = 1000 J, so 5 kJ = 5 × 1000 = 5000 J."
  },

  // --- Energy Density ---
  {
    topic: "Energy Density",
    q: "A fuel sample gives 80 J of energy from 4 g. What is its energy density?",
    options: ["320 J/g", "20 J/g", "76 J/g", "4 J/g"],
    correct: 1,
    explain: "Energy Density = Energy ÷ Mass = 80 ÷ 4 = 20 J/g."
  },
  {
    topic: "Energy Density",
    q: "A battery material has an energy density of 15 J/g. How much energy is stored in 3 g of it?",
    options: ["5 J", "18 J", "45 J", "150 J"],
    correct: 2,
    explain: "Energy = Energy Density × Mass = 15 × 3 = 45 J."
  }
];

let current = 0;
let score = 0;
let answered = false;

function shuffle(arr) {
  // Fisher-Yates
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}
shuffle(questions);

function render() {
  const area = document.getElementById('quizArea');
  if (current >= questions.length) { showResults(); return; }
  const qObj = questions[current];
  answered = false;
  document.getElementById('progLabel').textContent = `Question ${current + 1} of ${questions.length}`;
  document.getElementById('progFill').style.width = `${((current) / questions.length) * 100}%`;

  area.innerHTML = `
    <div class="card">
      <span class="topic-tag">${qObj.topic}</span>
      <div class="q-number">Question ${current + 1}</div>
      <div class="question-text">${qObj.q}</div>
      <div class="answers" id="answers">
        ${qObj.options.map((opt, i) => `<button class="ans-btn" data-idx="${i}">${opt}</button>`).join('')}
      </div>
      <div class="feedback" id="feedback"></div>
    </div>
    <button class="next-btn" id="nextBtn">Next &rarr;</button>
  `;

  document.querySelectorAll('.ans-btn').forEach(btn => {
    btn.addEventListener('click', () => pick(parseInt(btn.dataset.idx)));
  });
  document.getElementById('nextBtn').addEventListener('click', () => { current++; render(); });
}

function pick(idx) {
  if (answered) return;
  answered = true;
  const qObj = questions[current];
  const btns = document.querySelectorAll('.ans-btn');
  btns.forEach(b => b.classList.add('locked'));

  const fb = document.getElementById('feedback');
  if (idx === qObj.correct) {
    score++;
    btns[idx].classList.add('correct');
    fb.className = 'feedback show right';
    fb.textContent = '✓  Correct! ' + qObj.explain;
  } else {
    btns[idx].classList.add('wrong');
    btns[qObj.correct].classList.add('correct');
    fb.className = 'feedback show wrong-fb';
    fb.textContent = '✗  Not quite. ' + qObj.explain;
  }
  document.getElementById('nextBtn').classList.add('show');
}

function showResults() {
  document.getElementById('progFill').style.width = '100%';
  document.getElementById('progLabel').textContent = 'Quiz Complete!';
  const pct = Math.round((score / questions.length) * 100);
  let verdict = '';
  if (pct === 100) verdict = 'Perfect score — you earned your Beauty School Board Certification!';
  else if (pct >= 80) verdict = 'Excellent work! You know your energy stores and transfers.';
  else if (pct >= 60) verdict = 'Good effort. Review the topics you missed and try again.';
  else verdict = 'Keep studying — re-read the training manual and give it another go!';

  document.getElementById('quizArea').innerHTML = `
    <div class="card results-card">
      <h2>Final Exam Results</h2>
      <div class="score-big">${score} / ${questions.length}</div>
      <div class="verdict">${verdict}</div>
      <button class="retry-btn" onclick="location.reload()">Retake Quiz</button>
    </div>
  `;
}

render();
</script>
</body>
</html>
