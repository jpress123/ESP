<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>French Vocab Trainer</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
    --bg: #fef0f5;
    --surface: #ffffff;
    --gold: #d4849b;
    --gold-light: #f2b5c8;
    --teal: #b8a9c9;
    --rose: #e74c7a;
    --text: #3d2b3d;
    --text-dim: #8b7088;
    --accent: #f7c5d5;
    --glass: rgba(255, 255, 255, 0.7);
    --shine: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 50%, #fce4ec 100%);
}

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #fef0f5 0%, #fce4ec 30%, #f3e5f5 60%, #fef0f5 100%);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Floating Particles Animation */
        .particles-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--gold-light);
            border-radius: 50%;
            opacity: 0.4;
            animation: float-up linear infinite;
            box-shadow: 0 0 8px rgba(212, 132, 155, 0.6);
        }
        
        .particle:nth-child(odd) {
            width: 6px;
            height: 6px;
        }

        @keyframes float-up {
            0% {
                transform: translateY(0) translateX(0);
                opacity: 0.6;
            }
            50% {
                opacity: 0.3;
            }
            100% {
                transform: translateY(-100vh) translateX(var(--tx));
                opacity: 0;
            }
        }

        /* Blob Shapes */
        .blob {
            position: fixed;
            border-radius: 45% 55% 50% 50% / 50% 50% 50% 50%;
            opacity: 0.05;
            z-index: 0;
        }

        .blob-1 {
            width: 300px;
            height: 300px;
            background: #f8bbd0;
            top: -50px;
            right: -100px;
            opacity: 0.15;
            animation: blob-morph 8s ease-in-out infinite;
        }

        .blob-2 {
            width: 250px;
            height: 250px;
            background: #e1bee7;
            bottom: 100px;
            left: -80px;
            opacity: 0.15;
            animation: blob-morph 10s ease-in-out infinite reverse;
        }

        .blob-3 {
            width: 200px;
            height: 200px;
            background: #f8bbd0;
            top: 50%;
            right: 5%;
            opacity: 0.15;
            animation: blob-morph 12s ease-in-out infinite;
        }

        @keyframes blob-morph {
            0%, 100% {
                border-radius: 45% 55% 50% 50% / 50% 50% 50% 50%;
            }
            25% {
                border-radius: 50% 50% 50% 45% / 50% 50% 55% 50%;
            }
            50% {
                border-radius: 50% 45% 55% 50% / 50% 50% 50% 50%;
            }
            75% {
                border-radius: 55% 50% 50% 50% / 50% 45% 50% 55%;
            }
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 2;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Screen Styles */
        .screen {
            display: none;
            width: 100%;
        }

        .screen.active {
            display: block;
            animation: fade-in 0.5s ease-in;
        }

        @keyframes fade-in {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--rose);
            text-shadow: 0 0 20px rgba(231, 74, 122, 0.2);
        }

        .header p {
            color: var(--text-dim);
            font-size: 1rem;
        }

        /* Glass Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 132, 155, 0.3);
            border-radius: 16px;
            padding: 40px 30px;
            box-shadow: 0 4px 20px rgba(212, 132, 155, 0.15);
        }

        /* Topic Selection */
        .topics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .topic-btn {
            background: rgba(26, 15, 46, 0.5);
            border: 2px solid var(--gold);
            color: var(--text);
            padding: 20px 15px;
            border-radius: 12px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .topic-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(212, 132, 155, 0.1);
            transition: left 0.3s ease;
        }

        .topic-btn:hover {
            border-left-color: var(--gold);
            border-top-color: rgba(212, 132, 155, 0.4);
            border-right-color: rgba(212, 132, 155, 0.4);
            border-bottom-color: rgba(212, 132, 155, 0.4);
            box-shadow: 0 0 15px rgba(212, 132, 155, 0.3);
            transform: translateY(-3px);
        }

        .topic-btn:hover::before {
            left: 100%;
        }

        /* Learn Phase */
        .vocab-card {
            text-align: center;
            margin-bottom: 40px;
        }

        .vocab-french {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--gold-light);
            margin-bottom: 15px;
            text-shadow: 0 0 20px rgba(245, 200, 66, 0.3);
        }

        .vocab-english {
            font-size: 1.3rem;
            color: var(--text);
            margin-bottom: 30px;
        }

        .example-box {
            background: rgba(184, 169, 201, 0.1);
            border-left: 4px solid var(--teal);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            text-align: left;
        }

        .example-french {
            font-style: italic;
            color: var(--teal);
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        .example-english {
            color: var(--text-dim);
            font-size: 0.95rem;
        }

        /* Practice Phase */
        .practice-card {
            margin-bottom: 30px;
        }

        .practice-label {
            color: var(--text-dim);
            font-size: 0.9rem;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .practice-question {
            font-size: 1.4rem;
            color: var(--text);
            margin-bottom: 25px;
            font-weight: 600;
        }

        .practice-question.english {
            color: var(--gold);
        }

        .practice-input {
            width: 100%;
            padding: 15px 20px;
            font-size: 1.1rem;
            background: rgba(232, 224, 240, 0.05);
            border: 2px solid var(--gold);
            border-radius: 10px;
            color: var(--text);
            font-family: 'Poppins', sans-serif;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .practice-input:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 15px rgba(212, 132, 155, 0.2);
            background: #fff;
        }

        .practice-input.correct {
            border-color: #7bc67e;
            box-shadow: 0 0 15px rgba(123, 198, 126, 0.3);
        }

        .practice-input.incorrect {
            border-color: var(--rose);
            box-shadow: 0 0 15px rgba(231, 76, 122, 0.3);
        }

        .feedback {
            font-size: 0.95rem;
            margin-bottom: 20px;
            padding: 12px 15px;
            border-radius: 8px;
            display: none;
        }

        .feedback.show {
            display: block;
            animation: fade-in 0.3s ease;
        }

        .feedback.correct {
            background: rgba(123, 198, 126, 0.15);
            color: #7bc67e;
            border-left: 4px solid #7bc67e;
        }

        .feedback.incorrect {
            background: rgba(231, 76, 122, 0.15);
            color: var(--rose);
            border-left: 4px solid var(--rose);
        }

        /* Buttons */
        .btn {
            padding: 12px 30px;
            font-size: 1rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-block;
            margin: 10px 10px 10px 0;
        }

        .btn-primary {
            background: linear-gradient(135deg, #d4849b, #e8a0b8);
            color: #fff;
            border: none;
            border-radius: 25px;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            background: linear-gradient(135deg, #c06880, #d4849b);
            box-shadow: 0 4px 15px rgba(212, 132, 155, 0.4);
        }

        .btn-primary:active {
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text);
            border: 2px solid rgba(212, 132, 155, 0.4);
        }

        .btn-secondary:hover {
            border-color: var(--gold);
            background: rgba(212, 132, 155, 0.1);
        }

        .btn-wide {
            width: 100%;
            padding: 15px;
            font-size: 1.1rem;
            margin: 10px 0;
        }

        /* Progress */
        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(212, 132, 155, 0.15);
            border-radius: 3px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #d4849b, #e8a0b8);
            transition: width 0.3s ease;
        }

        /* Score Screen */
        .score-container {
            text-align: center;
        }

        .score-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: var(--gold-light);
            margin-bottom: 20px;
        }

        .score-display {
            font-size: 3rem;
            color: var(--rose);
            margin-bottom: 30px;
            font-weight: 700;
        }

        .score-message {
            font-size: 1.2rem;
            color: var(--text);
            margin-bottom: 40px;
        }

        .score-stats {
            background: rgba(212, 132, 155, 0.08);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(212, 132, 155, 0.2);
        }

        .stat-item {
            margin: 10px 0;
            font-size: 1rem;
            color: var(--text);
        }

        .stat-label {
            color: var(--text-dim);
            margin-right: 10px;
        }

        .stat-value {
            color: var(--gold);
            font-weight: 700;
        }

        /* Progress Tracker */
        .progress-tracker {
            display: flex;
            gap: 8px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .progress-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(212, 132, 155, 0.2);
            border: 1px solid rgba(212, 132, 155, 0.3);
        }

        .progress-dot.active {
            background: var(--gold);
            box-shadow: 0 0 10px rgba(212, 132, 155, 0.5);
        }

        .progress-dot.complete {
            background: #7bc67e;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }

            .header h1 {
                font-size: 2rem;
            }

            .glass-card {
                padding: 25px 20px;
            }

            .topics-grid {
                grid-template-columns: 1fr;
            }

            .vocab-french {
                font-size: 2rem;
            }

            .practice-question {
                font-size: 1.2rem;
            }

            .score-display {
                font-size: 2.5rem;
            }

            .btn {
                padding: 10px 20px;
                font-size: 0.95rem;
            }
        }

        /* Accessibility */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }
    </style>
</head>
<body>
    <!-- Background Blobs -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <!-- Floating Particles -->
    <div class="particles-container" id="particlesContainer"></div>

    <!-- Main Container -->
    <div class="container">
        <!-- Topic Selection Screen -->
        <div id="topicScreen" class="screen active">
            <div class="header">
                <h1>Leçon 5</h1>
                <p>Pick a topic to practice</p>
            </div>
            <div class="glass-card">
                <div class="topics-grid" id="topicsGrid"></div>
            </div>
        </div>

        <!-- Learn Screen -->
        <div id="learnScreen" class="screen">
            <div class="header">
                <h1 id="learnHeader">Learn</h1>
                <p id="learnSubtitle"></p>
            </div>
            <div class="glass-card">
                <div class="progress-bar">
                    <div class="progress-fill" id="learnProgressFill"></div>
                </div>
                <div class="progress-tracker" id="learnProgressDots"></div>

                <div class="vocab-card">
                    <div class="vocab-french" id="learnFrench"></div>
                    <div class="vocab-english" id="learnEnglish"></div>
                    <div class="example-box">
                        <div class="example-french" id="learnExampleFr"></div>
                        <div class="example-english" id="learnExampleEn"></div>
                    </div>
                </div>

                <div style="text-align: center;">
                    <button class="btn btn-primary btn-wide" id="learnGotItBtn">Got it!</button>
                </div>
            </div>
        </div>

        <!-- Practice Screen -->
        <div id="practiceScreen" class="screen">
            <div class="header">
                <h1 id="practiceHeader">Practice</h1>
                <p id="practiceSubtitle"></p>
            </div>
            <div class="glass-card">
                <div class="progress-bar">
                    <div class="progress-fill" id="practiceProgressFill"></div>
                </div>

                <div class="practice-card">
                    <div class="practice-label" id="practiceLabel"></div>
                    <div class="practice-question" id="practiceQuestion"></div>
                    <input type="text" class="practice-input" id="practiceInput" placeholder="Type your answer here..." />
                    <div class="feedback" id="practiceFeedback"></div>
                    <div style="text-align: center;">
                        <button class="btn btn-primary btn-wide" id="practiceSubmitBtn">Check Answer</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Score Screen -->
        <div id="scoreScreen" class="screen">
            <div class="header">
                <h1>Complete!</h1>
                <p>Great job, Elia!</p>
            </div>
            <div class="glass-card">
                <div class="score-container">
                    <div class="score-title">Your Score</div>
                    <div class="score-display" id="scorePercentage">0%</div>
                    <div class="score-message" id="scoreMessage"></div>

                    <div class="score-stats">
                        <div class="stat-item">
                            <span class="stat-label">Correct:</span>
                            <span class="stat-value" id="scoreCorrect">0</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Incorrect:</span>
                            <span class="stat-value" id="scoreIncorrect">0</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Accuracy:</span>
                            <span class="stat-value" id="scoreAccuracy">0%</span>
                        </div>
                    </div>

                    <button class="btn btn-primary btn-wide" id="scorePracticeWeakBtn">Practice Weak Items</button>
                    <button class="btn btn-secondary btn-wide" id="scoreNewTopicBtn">Choose New Topic</button>
                </div>
            </div>
        </div>
    </div>

    <script>

        // Populate "All Topics" with items from all categories
        Object.keys(vocabulary).forEach(topic => {
            if (topic !== 'All Topics') {
                vocabulary['All Topics'] = vocabulary['All Topics'].concat(vocabulary[topic]);
            }
        });

        // App State
        let appState = {
            currentTopic: null,
            currentVocabIndex: 0,
            vocabList: [],
            answers: [],
            phase: 'topic', // 'topic', 'learn', 'practice', 'score'
            practiceIndex: 0,
            practiceExercises: [],
            scores: {
                correct: 0,
                incorrect: 0
            }
        };

        // Initialize Particles
        function initializeParticles() {
            const container = document.getElementById('particlesContainer');
            const particleCount = 30;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                const left = Math.random() * 100;
                const duration = 5 + Math.random() * 10;
                const delay = Math.random() * 2;
                const translateX = (Math.random() - 0.5) * 100;

                particle.style.left = left + '%';
                particle.style.animationDuration = duration + 's';
                particle.style.animationDelay = -delay + 's';
                particle.style.setProperty('--tx', translateX + 'px');

                container.appendChild(particle);
            }
        }

        // Remove Accents Helper
        function removeAccents(str) {
            return str.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
        }

        // Normalize Input for Comparison
        function normalizeText(text) {
            return removeAccents(text.toLowerCase().trim());
        }

        // Normalize French Text (accept both with and without accents)
        function normalizeFrench(text) {
            return normalizeText(text);
        }

        // Get Correct Answers
        function getCorrectAnswers(item, exerciseType) {
            const answers = [];

            if (exerciseType === 'typeA') {
                // Translate English to French
                answers.push(normalizeFrench(item.french));
            } else if (exerciseType === 'typeB') {
                // Complete sentence - extract the blank word
                answers.push(normalizeFrench(item.french.split(/[(),]/)[0]));
            } else if (exerciseType === 'typeC') {
                // Say it again - exact French
                answers.push(normalizeFrench(item.french));
            }

            return answers;
        }

        // Check Answer
        function checkAnswer(userAnswer, correctAnswers) {
            const normalized = normalizeFrench(userAnswer);
            return correctAnswers.some(correct => correct === normalized);
        }

        // Render Topic Selection
        function renderTopicSelection() {
            const grid = document.getElementById('topicsGrid');
            grid.innerHTML = '';

            const topics = Object.keys(vocabulary);

            topics.forEach(topic => {
                const btn = document.createElement('button');
                btn.className = 'topic-btn';
                btn.textContent = topic;
                btn.onclick = () => startTopic(topic);
                grid.appendChild(btn);
            });
        }

        // Start Topic
        function startTopic(topic) {
            appState.currentTopic = topic;
            appState.vocabList = JSON.parse(JSON.stringify(vocabulary[topic]));
            appState.currentVocabIndex = 0;
            appState.answers = [];
            appState.scores = { correct: 0, incorrect: 0 };
            appState.phase = 'learn';
            appState.practiceIndex = 0;
            appState.practiceExercises = [];

            // Build practice exercises
            buildPracticeExercises();

            showScreen('learnScreen');
            renderLearnPhase();
        }

        // Build Practice Exercises
        function buildPracticeExercises() {
            appState.practiceExercises = [];

            appState.vocabList.forEach((item, index) => {
                // Type A: Translate English to French
                appState.practiceExercises.push({
                    type: 'typeA',
                    itemIndex: index,
                    item: item,
                    label: 'Translate to French'
                });

                // Type C: Spell it out
                appState.practiceExercises.push({
                    type: 'typeC',
                    itemIndex: index,
                    item: item,
                    label: 'Spell it out'
                });

                // Type B: Complete sentence (if applicable)
                if (item.french.includes('...')) {
                    appState.practiceExercises.push({
                        type: 'typeB',
                        itemIndex: index,
                        item: item,
                        label: 'Complete the phrase'
                    });
                }
            });

            // Shuffle exercises
            for (let i = appState.practiceExercises.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [appState.practiceExercises[i], appState.practiceExercises[j]] =
                [appState.practiceExercises[j], appState.practiceExercises[i]];
            }
        }

        // Render Learn Phase
        function renderLearnPhase() {
            const item = appState.vocabList[appState.currentVocabIndex];
            const topicName = appState.currentTopic;

            document.getElementById('learnHeader').textContent = topicName;
            document.getElementById('learnSubtitle').textContent =
                `Word ${appState.currentVocabIndex + 1} of ${appState.vocabList.length}`;

            document.getElementById('learnFrench').textContent = item.french;
            document.getElementById('learnEnglish').textContent = item.english;
            document.getElementById('learnExampleFr').textContent = item.exampleFr;
            document.getElementById('learnExampleEn').textContent = item.exampleEn;

            // Update progress
            const progress = ((appState.currentVocabIndex + 1) / appState.vocabList.length) * 100;
            document.getElementById('learnProgressFill').style.width = progress + '%';

            // Update progress dots
            const dotsContainer = document.getElementById('learnProgressDots');
            dotsContainer.innerHTML = '';
            for (let i = 0; i < appState.vocabList.length; i++) {
                const dot = document.createElement('div');
                dot.className = 'progress-dot';
                if (i === appState.currentVocabIndex) {
                    dot.classList.add('active');
                } else if (i < appState.currentVocabIndex) {
                    dot.classList.add('complete');
                }
                dotsContainer.appendChild(dot);
            }

            // Update button text
            const btn = document.getElementById('learnGotItBtn');
            if (appState.currentVocabIndex === appState.vocabList.length - 1) {
                btn.textContent = 'Start Practice!';
            } else {
                btn.textContent = 'Got it!';
            }
        }

        // Handle Learn Got It
        function handleLearnGotIt() {
            appState.currentVocabIndex++;

            if (appState.currentVocabIndex >= appState.vocabList.length) {
                // Move to practice phase
                appState.phase = 'practice';
                appState.practiceIndex = 0;
                showScreen('practiceScreen');
                renderPracticePhase();
            } else {
                renderLearnPhase();
            }
        }

        // Render Practice Phase
        function renderPracticePhase() {
            const exercise = appState.practiceExercises[appState.practiceIndex];
            const topicName = appState.currentTopic;

            document.getElementById('practiceHeader').textContent = topicName;
            document.getElementById('practiceSubtitle').textContent =
                `Exercise ${appState.practiceIndex + 1} of ${appState.practiceExercises.length}`;

            // Update progress
            const progress = ((appState.practiceIndex + 1) / appState.practiceExercises.length) * 100;
            document.getElementById('practiceProgressFill').style.width = progress + '%';

            // Clear previous feedback
            const feedback = document.getElementById('practiceFeedback');
            feedback.classList.remove('show', 'correct', 'incorrect');
            feedback.innerHTML = '';

            // Render exercise
            const label = document.getElementById('practiceLabel');
            const question = document.getElementById('practiceQuestion');
            const input = document.getElementById('practiceInput');

            label.textContent = exercise.label.toUpperCase();
            input.value = '';
            input.classList.remove('correct', 'incorrect');
            input.disabled = false;

            if (exercise.type === 'typeA') {
                // Translate English to French
                question.textContent = exercise.item.english;
                question.classList.add('english');
                question.classList.remove('french');
                input.placeholder = 'Type the French...';
            } else if (exercise.type === 'typeB') {
                // Complete the sentence
                const blanked = exercise.item.french.replace(/\.\.\./, '_____');
                question.textContent = blanked;
                question.classList.remove('english');
                question.classList.add('french');
                input.placeholder = 'Fill in the blank...';
            } else if (exercise.type === 'typeC') {
                // Say it again
                question.textContent = exercise.item.french;
                question.classList.add('french');
                question.classList.remove('english');
                input.placeholder = 'Type it exactly...';
            }

            input.focus();
        }

        // Handle Practice Submit
        function handlePracticeSubmit() {
            const exercise = appState.practiceExercises[appState.practiceIndex];
            const input = document.getElementById('practiceInput');
            const userAnswer = input.value;
            const feedback = document.getElementById('practiceFeedback');
            const submitBtn = document.getElementById('practiceSubmitBtn');

            if (!userAnswer.trim()) {
                feedback.innerHTML = 'Please type an answer!';
                feedback.classList.add('show', 'incorrect');
                return;
            }

            const correctAnswers = getCorrectAnswers(exercise.item, exercise.type);
            const isCorrect = checkAnswer(userAnswer, correctAnswers);

            input.disabled = true;
            submitBtn.disabled = true;

            if (isCorrect) {
                appState.scores.correct++;
                input.classList.add('correct');
                feedback.innerHTML = '✓ Correct! Well done!';
                feedback.classList.add('show', 'correct');
            } else {
                appState.scores.incorrect++;
                input.classList.add('incorrect');
                const correctDisplay = exercise.item.french;
                feedback.innerHTML = `✗ Not quite. The answer is: <strong>${correctDisplay}</strong>`;
                feedback.classList.add('show', 'incorrect');
            }

            // Show next button
            submitBtn.textContent = 'Next →';
            submitBtn.disabled = false;
            submitBtn.onclick = handlePracticeNext;
        }

        // Handle Practice Next
        function handlePracticeNext() {
            appState.practiceIndex++;

            if (appState.practiceIndex >= appState.practiceExercises.length) {
                // Move to score phase
                appState.phase = 'score';
                showScreen('scoreScreen');
                renderScorePhase();
            } else {
                // Reset submit button
                document.getElementById('practiceSubmitBtn').textContent = 'Check Answer';
                document.getElementById('practiceSubmitBtn').onclick = handlePracticeSubmit;
                renderPracticePhase();
            }
        }

        // Render Score Phase
        function renderScorePhase() {
            const total = appState.practiceExercises.length;
            const correct = appState.scores.correct;
            const incorrect = appState.scores.incorrect;
            const percentage = Math.round((correct / total) * 100);

            document.getElementById('scorePercentage').textContent = percentage + '%';
            document.getElementById('scoreCorrect').textContent = correct;
            document.getElementById('scoreIncorrect').textContent = incorrect;
            document.getElementById('scoreAccuracy').textContent = percentage + '%';

            // Message based on score
            let message = '';
            if (percentage === 100) {
                message = 'Perfect! You\'re a French master! 🎉';
            } else if (percentage >= 80) {
                message = 'Excellent work! You\'ve got this! 🌟';
            } else if (percentage >= 60) {
                message = 'Good effort! Keep practicing! 💪';
            } else {
                message = 'Keep practicing, you\'ll get better! 📚';
            }

            document.getElementById('scoreMessage').textContent = message;
        }

        // Show Screen
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(screen => {
                screen.classList.remove('active');
            });
            document.getElementById(screenId).classList.add('active');
        }

        // Handle New Topic
        function handleNewTopic() {
            appState.phase = 'topic';
            showScreen('topicScreen');
        }

        // Handle Practice Weak Items
        function handlePracticeWeak() {
            // Rebuild exercises with same topic
            const currentTopic = appState.currentTopic;
            appState.currentVocabIndex = 0;
            appState.answers = [];
            appState.scores = { correct: 0, incorrect: 0 };
            appState.phase = 'practice';
            appState.practiceIndex = 0;

            buildPracticeExercises();
            showScreen('practiceScreen');
            renderPracticePhase();
        }

        // Event Listeners
        document.getElementById('learnGotItBtn').addEventListener('click', handleLearnGotIt);
        document.getElementById('practiceSubmitBtn').addEventListener('click', handlePracticeSubmit);
        document.getElementById('practiceInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                handlePracticeSubmit();
            }
        });
        document.getElementById('scoreNewTopicBtn').addEventListener('click', handleNewTopic);
        document.getElementById('scorePracticeWeakBtn').addEventListener('click', handlePracticeWeak);

        // Initialize
        function init() {
            initializeParticles();
            renderTopicSelection();
        }

        // Start
        init();
    </script>
